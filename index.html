<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>BUBBLE BURST</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #05060f;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    font-family: 'Press Start 2P', monospace;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 50% 40%, #131634 0%, #07081a 60%, #03030c 100%);
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: min(100vw, 133.333vh);
    height: min(75vw, 100vh);
    box-shadow: 0 0 0 4px #1a1d3a, 0 0 40px rgba(120,60,200,0.45), 0 0 90px rgba(255,60,170,0.25);
    border-radius: 4px;
    touch-action: none;
  }
  /* on-screen touch controls — shown only on touch devices */
  #touch-controls { display: none; }
  body.touch #touch-controls {
    display: flex;
    position: fixed; left: 0; right: 0; bottom: 0;
    justify-content: space-between; align-items: flex-end;
    padding: 0 16px calc(16px + env(safe-area-inset-bottom)) 16px;
    box-sizing: border-box;
    z-index: 10; pointer-events: none;
  }
  .tc-group { display: flex; gap: 16px; pointer-events: none; }
  .tc-btn {
    pointer-events: auto;
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 3px solid rgba(120,225,255,0.7);
    background: rgba(20,28,60,0.40);
    color: #cdefff;
    font-family: 'Press Start 2P', monospace;
    font-size: 22px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    touch-action: none; user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 2px 12px rgba(0,0,0,0.45);
  }
  .tc-btn.active { background: rgba(120,225,255,0.5); transform: scale(0.93); }
  .tc-shoot { border-color: rgba(255,95,176,0.85); color: #ffd0e8; }
  .tc-jump  { border-color: rgba(95,230,160,0.9); color: #d6ffe8; }
  /* "rotate your device" overlay — only on touch devices held in portrait */
  #rotate { display: none; }
  .rot-emoji { font-size: 66px; animation: rothint 1.8s ease-in-out infinite; }
  @keyframes rothint { 0%,40% { transform: rotate(0deg); } 65%,100% { transform: rotate(-90deg); } }
  .rot-text { font-size: 13px; line-height: 1.9; color: #cdefff; }
  .rot-text span { display: block; margin-top: 10px; font-size: 9px; color: #9aa3d0; }
  @media (orientation: portrait) {
    body.touch #rotate {
      display: flex; position: fixed; inset: 0; z-index: 50;
      flex-direction: column; align-items: center; justify-content: center; gap: 22px;
      background: radial-gradient(circle at 50% 45%, #131634 0%, #05060f 75%);
      text-align: center; font-family: 'Press Start 2P', monospace;
    }
    body.touch #touch-controls { display: none; }
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="640" height="480"></canvas></div>
<div id="touch-controls">
  <div class="tc-group tc-left">
    <button class="tc-btn" data-act="left" aria-label="left">&#9664;</button>
    <button class="tc-btn" data-act="right" aria-label="right">&#9654;</button>
  </div>
  <div class="tc-group tc-right">
    <button class="tc-btn tc-shoot" data-act="shoot" aria-label="shoot">&#9679;</button>
    <button class="tc-btn tc-jump" data-act="jump" aria-label="jump">&#9650;</button>
  </div>
</div>
<div id="rotate">
  <div class="rot-emoji">&#128241;</div>
  <div class="rot-text">가로로 돌려주세요<span>ROTATE YOUR DEVICE</span></div>
</div>
<script>
"use strict";
/* =========================================================================
   BUBBLE BURST — original single-screen bubble platformer
   (genre/mechanics inspired by the bubble-shooter platformer style;
    all characters, art and copy are original)

   Handoff notes for Claude Code:
   - Logical resolution is 640x480, tile grid 20x15 @ 32px (TILE).
   - Maps are ASCII: '#'=solid wall, '='=one-way platform, 'e'=enemy spawn,
     'P'=player spawn. Markers are stripped to '.' for the collision grid.
   - Physics are delta-time based (px/s, px/s^2). Axis-separated tile
     collision in moveX / moveY.
   - Game states: TITLE, PLAYING, STAGECLEAR, GAMEOVER, WIN.
   ========================================================================= */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 640, H = 480, TILE = 32, COLS = 20, ROWS = 15;

/* ---- tuning -------------------------------------------------------------- */
const GRAVITY      = 1600;   // px/s^2
const MOVE_SPEED   = 165;    // player horizontal px/s
const JUMP_VEL     = 600;    // player jump impulse px/s  (clears ~3.4 tiles)
const BUBBLE_SPEED = 320;    // bubble fly px/s
const BUBBLE_FLY   = 0.45;   // seconds the bubble travels horizontally
const BUBBLE_RISE  = 48;     // float-up px/s after fly phase
const BUBBLE_LIFE  = 9;      // seconds before an empty bubble pops
const SHOOT_CD     = 0.30;   // seconds between shots
const MAX_BUBBLES  = 6;
const CAPTURE_TIME = 6;      // seconds a captured enemy stays bubbled
const RESPAWN_INV  = 2.2;    // seconds of invincibility after losing a life

const PW = 22, PH = 24;      // player size
const EW = 26, EH = 24;      // enemy size

/* ---- palette ------------------------------------------------------------- */
const COL = {
  bg:        '#0a0b1e',
  hud:       '#05060f',
  ink:       '#ffffff',
  yellow:    '#ffe24d',
  cyan:      '#38e6ff',
  pink:      '#ff5fb0',
  green:     '#5fe6a0',
};

/* =========================================================================
   STAGES
   ========================================================================= */
const STAGE1 = [
  "####################",
  "#..................#",
  "#..................#",
  "#..................#",
  "#.....e.....e......#",
  "#...==========.....#",
  "#..................#",
  "#...e..............#",
  "#..====......====..#",
  "#..................#",
  "#..................#",
  "#...==========.....#",
  "#..................#",
  "#........P.........#",
  "####################",
];
const STAGE2 = [
  "####################",
  "#..................#",
  "#..................#",
  "#..................#",
  "#...e..........e...#",
  "#..====......====..#",
  "#..................#",
  "#........e.........#",
  "#...==========.....#",
  "#..................#",
  "#.....e............#",
  "#..====......====..#",
  "#..................#",
  "#........P.........#",
  "####################",
];
const STAGE3 = [
  "####################",
  "#........K.........#",
  "#..................#",
  "#..................#",
  "#.....e.....e......#",
  "#...==========.....#",
  "#...e..............#",
  "#..====......====..#",
  "#........e.........#",
  "#....==========....#",
  "#..............e...#",
  "#..====......====..#",
  "#..................#",
  "#........P.........#",
  "####################",
];

const STAGES = [
  { map: STAGE1, speed: 55, color: '#ffb23a', name: 'BUBBLE GROVE' },
  { map: STAGE2, speed: 72, color: '#b06bff', name: 'NEON LADDER'  },
  { map: STAGE3, speed: 92, color: '#ff5e7a', name: 'FOAM TOWER'   },
];

const DIFFS = [
  { key: 'EASY',   mult: 0.80 },
  { key: 'NORMAL', mult: 1.00 },
  { key: 'HARD',   mult: 1.35 },
];

/* =========================================================================
   STRIPE PATTERNS (diagonal, arcade look)
   ========================================================================= */
function makeStripe(base, stripe, size = 16, lw = 6) {
  const p = document.createElement('canvas');
  p.width = p.height = size;
  const x = p.getContext('2d');
  x.fillStyle = base; x.fillRect(0, 0, size, size);
  x.strokeStyle = stripe; x.lineWidth = lw; x.lineCap = 'square';
  for (let i = -size; i < size * 2; i += size * 0.75) {
    x.beginPath(); x.moveTo(i, size); x.lineTo(i + size, 0); x.stroke();
  }
  return ctx.createPattern(p, 'repeat');
}
const wallPat = makeStripe('#b3146e', '#ff48a8');
const platPat = makeStripe('#0f6f8c', '#3fe0ff');

/* =========================================================================
   AUDIO (tiny synth blips)
   ========================================================================= */
let actx = null;
function audio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === 'suspended') actx.resume();
  return actx;
}
function beep(freq, dur, type = 'square', vol = 0.08, slide = 0) {
  if (muteAll) return;
  const a = audio(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, a.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), a.currentTime + dur);
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
  o.connect(g); g.connect(a.destination);
  o.start(); o.stop(a.currentTime + dur);
}
const sfx = {
  jump:  () => beep(420, 0.12, 'square', 0.06, 260),
  shoot: () => beep(680, 0.10, 'triangle', 0.05, -360),
  capture: () => beep(300, 0.12, 'sine', 0.07, 220),
  pop:   () => { beep(880, 0.08, 'square', 0.07, 220); setTimeout(() => beep(1320, 0.07, 'square', 0.05), 60); },
  // 왕이 거품에 맞을 때: 묵직한 임팩트 + 카랑한 타격음
  kingHit: () => { beep(200, 0.16, 'sawtooth', 0.09, -120); setTimeout(() => beep(1046, 0.09, 'square', 0.06, 180), 40); setTimeout(() => beep(1568, 0.08, 'square', 0.05), 110); },
  fruit: () => { beep(880, 0.07, 'triangle', 0.06); setTimeout(() => beep(1175, 0.07, 'triangle', 0.06), 70); setTimeout(() => beep(1568, 0.09, 'triangle', 0.06), 140); },
  die:   () => { beep(300, 0.25, 'sawtooth', 0.08, -200); setTimeout(() => beep(160, 0.35, 'sawtooth', 0.08, -100), 180); },
  clear: () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'square', 0.06), i * 110)); },
  start: () => { [392, 523, 659].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'square', 0.06), i * 90)); },
  // triumphant victory fanfare for clearing all stages
  win: () => {
    const melody = [523, 659, 784, 1047, 784, 1047, 1319];
    melody.forEach((f, i) => setTimeout(() => beep(f, 0.18, 'square', 0.07), i * 130));
    melody.forEach((f, i) => setTimeout(() => beep(f / 2, 0.18, 'triangle', 0.05), i * 130));
    setTimeout(() => beep(1568, 0.5, 'square', 0.07), melody.length * 130);
  },
  firework: () => beep(180 + Math.random() * 120, 0.18, 'sawtooth', 0.05, 320),
  // klaxon-style alert when the boss appears
  alarm: () => { for (let i = 0; i < 3; i++) setTimeout(() => { beep(660, 0.13, 'square', 0.07); setTimeout(() => beep(440, 0.15, 'square', 0.07), 95); }, i * 320); },
};

/* =========================================================================
   BGM — procedural chiptune loops (title / stage / boss), all via WebAudio.
   M key toggles muteAll (music + sfx). Scheduled from the main loop with a
   short look-ahead so it stays in sync without a separate timer.
   ========================================================================= */
let muteAll = false;
const mtof = (m) => 440 * Math.pow(2, (m - 69) / 12);   // midi note -> Hz

const TRACKS = {
  // bright, bouncy welcome theme (C major, I–vi–IV–V feel)
  title: {
    stepDur: 0.16, leadType: 'square', bassType: 'triangle', leadVol: 0.045, bassVol: 0.05,
    lead: [72,76,79,76, 81,79,76,72, 69,72,76,72, 74,71,67,0],
    bass: [48,0,55,0, 45,0,52,0, 41,0,48,0, 43,0,43,0],
  },
  // upbeat gameplay groove (A minor)
  stage: {
    stepDur: 0.15, leadType: 'square', bassType: 'triangle', leadVol: 0.045, bassVol: 0.05,
    lead: [69,72,76,81, 79,76,72,76, 65,69,72,76, 67,71,74,0],
    bass: [45,45,57,45, 41,41,53,41, 43,43,55,43, 40,40,52,40],
  },
  // tense boss theme: fast driving sawtooth pedal on D with a creeping,
  // tritone-laced lead and a chromatic descent for dread.
  boss: {
    stepDur: 0.105, leadType: 'square', bassType: 'sawtooth', leadVol: 0.05, bassVol: 0.055,
    lead: [62,0,65,0, 68,0,65,62, 61,0,62,0, 65,68,69,68],
    bass: [38,38,38,38, 38,38,38,38, 39,38,37,38, 38,38,37,36],
  },
};

const music = { track: null, step: 0, nextTime: 0 };

function playNote(freq, t, dur, type, vol) {
  const a = audio(); if (!a || !freq) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + dur + 0.02);
}

function musicScheduler() {
  if (muteAll) return;
  const a = actx; if (!a || a.state !== 'running') return;
  const tr = TRACKS[music.track]; if (!tr) return;
  if (music.nextTime < a.currentTime - 0.25) music.nextTime = a.currentTime + 0.05; // resync after tab switch
  while (music.nextTime < a.currentTime + 0.13) {
    const t = music.nextTime;
    const ln = tr.lead[music.step % tr.lead.length];
    const bn = tr.bass[music.step % tr.bass.length];
    if (ln) playNote(mtof(ln), t, tr.stepDur * 0.92, tr.leadType, tr.leadVol);
    if (bn) playNote(mtof(bn), t, tr.stepDur * 0.98, tr.bassType, tr.bassVol);
    music.step++;
    music.nextTime += tr.stepDur;
  }
}

function updateMusic() {
  let want = null;
  if (game.state === 'TITLE') want = 'title';
  else if (game.state === 'PLAYING' || game.state === 'STAGECLEAR') want = (game.stage === 2) ? 'boss' : 'stage';
  // GAMEOVER / WIN -> silence so the death/victory sfx read clearly
  if (want !== music.track) {
    music.track = want;
    music.step = 0;
    if (actx) music.nextTime = actx.currentTime + 0.06;
  }
  if (music.track) musicScheduler();
}

/* =========================================================================
   INPUT
   ========================================================================= */
const keys = {};
const pressed = {};   // edge-triggered: cleared each frame after read
const KEYMAP = {
  ArrowLeft: 'left', KeyA: 'left',
  ArrowRight: 'right', KeyD: 'right',
  ArrowUp: 'jump', KeyW: 'jump', KeyZ: 'jump',
  Space: 'shoot', KeyX: 'shoot', KeyK: 'shoot',
  Enter: 'enter', NumpadEnter: 'enter',
  KeyM: 'mute',
};
addEventListener('keydown', (e) => {
  const a = KEYMAP[e.code];
  if (a) { e.preventDefault(); audio(); if (!keys[a]) pressed[a] = true; keys[a] = true; }
});
addEventListener('keyup', (e) => {
  const a = KEYMAP[e.code];
  if (a) { e.preventDefault(); keys[a] = false; }
});

/* --- touch controls (mobile): visible on-screen buttons + tap-to-start ---
   On touch devices we reveal the #touch-controls overlay: a left/right pad
   plus jump and shoot buttons. Movement keys are held while pressed; jump and
   shoot fire on press (edge-triggered, same as the keyboard). Menus advance by
   tapping the playfield. Non-touch devices keep keyboard-only and hide the UI. */
function setupTouch() {
  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) ||
                  (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
  if (!isTouch) return;
  document.body.classList.add('touch');

  const buzz = (ms) => { if (navigator.vibrate) { try { navigator.vibrate(ms); } catch (e) {} } };
  const press = (a) => { audio(); if (!keys[a]) pressed[a] = true; keys[a] = true; };
  const release = (a) => { keys[a] = false; };

  document.querySelectorAll('.tc-btn').forEach((btn) => {
    const act = btn.dataset.act;
    const down = (e) => { e.preventDefault(); press(act); buzz(act === 'jump' || act === 'shoot' ? 8 : 5); btn.classList.add('active'); };
    const up = (e) => { e.preventDefault(); release(act); btn.classList.remove('active'); };
    btn.addEventListener('pointerdown', down);
    btn.addEventListener('pointerup', up);
    btn.addEventListener('pointercancel', up);
    btn.addEventListener('pointerleave', up);
    btn.addEventListener('contextmenu', (e) => e.preventDefault());
  });

  // playfield tap: start/continue on menus, or FIRE during play (so you can
  // hold jump with one thumb and tap the screen to shoot at the same time).
  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault(); audio();
    if (game.state === 'PLAYING') { pressed.shoot = true; buzz(8); }
    else { pressed.enter = true; buzz(12); }
  });
}
setupTouch();

/* =========================================================================
   GAME STATE
   ========================================================================= */
const game = {
  state: 'TITLE',
  diff: 2,
  stage: 0,
  score: 0,
  lives: 3,
  high: +(localStorage.getItem('bb_high') || 0),
  grid: null,
  player: null,
  enemies: [],
  bubbles: [],
  fruits: [],
  particles: [],
  king: null,      // stage-3 boss (null when none / defeated)
  shots: [],       // king projectiles
  t: 0,            // global time
  overlayT: 0,     // timer for stage clear / messages
  shootCd: 0,
  shake: 0,
  newRecord: false, // set true on WIN when the score beats the old high
  winSpark: 0,      // confetti/firework spawn timer during WIN
  bossWarn: 0,      // seconds left to show the "DON'T TOUCH THE KING!" banner
};

/* --- tile helpers --- */
function tile(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return '#';
  return game.grid[r][c];
}
const isWall = (c, r) => tile(c, r) === '#';
const isPlat = (c, r) => tile(c, r) === '=';
const isGroundTile = (c, r) => { const t = tile(c, r); return t === '#' || t === '='; };

/* =========================================================================
   ENTITY PHYSICS (axis-separated tile collision)
   ========================================================================= */
function moveX(e) {
  e.x += e.vx * e.dt;
  e.hitWall = false;
  const r0 = Math.floor((e.y + 2) / TILE);
  const r1 = Math.floor((e.y + e.h - 3) / TILE);
  if (e.vx > 0) {
    const c = Math.floor((e.x + e.w) / TILE);
    for (let r = r0; r <= r1; r++) if (isWall(c, r)) { e.x = c * TILE - e.w; e.vx = 0; e.hitWall = true; break; }
  } else if (e.vx < 0) {
    const c = Math.floor(e.x / TILE);
    for (let r = r0; r <= r1; r++) if (isWall(c, r)) { e.x = (c + 1) * TILE; e.vx = 0; e.hitWall = true; break; }
  }
}
function moveY(e, allowOneWay) {
  const prevBottom = e.y + e.h;
  e.vy += GRAVITY * e.dt;
  e.y += e.vy * e.dt;
  e.grounded = false;
  const c0 = Math.floor((e.x + 3) / TILE);
  const c1 = Math.floor((e.x + e.w - 4) / TILE);
  if (e.vy >= 0) {
    const r = Math.floor((e.y + e.h) / TILE);
    for (let c = c0; c <= c1; c++) {
      const t = tile(c, r);
      if (t === '#' || (t === '=' && allowOneWay && prevBottom <= r * TILE + 2)) {
        e.y = r * TILE - e.h; e.vy = 0; e.grounded = true; break;
      }
    }
  } else {
    const r = Math.floor(e.y / TILE);
    for (let c = c0; c <= c1; c++) if (isWall(c, r)) { e.y = (r + 1) * TILE; e.vy = 0; break; }
  }
}
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

/* =========================================================================
   STAGE SETUP
   ========================================================================= */
function loadStage(i) {
  const def = STAGES[i];
  game.grid = def.map.map((row) => row.split('').map((ch) => (ch === 'e' || ch === 'P' || ch === 'K') ? '.' : ch));
  game.enemies = [];
  game.bubbles = [];
  game.fruits = [];
  game.particles = [];
  game.shots = [];
  game.king = null;
  game.shootCd = 0;
  const speed = def.speed * DIFFS[game.diff].mult;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const ch = def.map[r][c];
      if (ch === 'P') {
        game.player = {
          x: c * TILE + (TILE - PW) / 2, y: r * TILE, w: PW, h: PH,
          vx: 0, vy: 0, dir: 1, grounded: false, dt: 0,
          inv: 1.0, anim: 0, startX: c * TILE + (TILE - PW) / 2, startY: r * TILE,
        };
      } else if (ch === 'e') {
        game.enemies.push({
          x: c * TILE + (TILE - EW) / 2, y: r * TILE, w: EW, h: EH,
          vx: 0, vy: 0, dir: Math.random() < 0.5 ? -1 : 1,
          grounded: false, dt: 0, state: 'walk', speed,
          color: def.color, capT: 0, anim: Math.random() * 6, mad: false,
          canDrop: i === 1, dropping: 0,   // stage 2 enemies dive down through platforms
        });
      } else if (ch === 'K') {
        game.king = {
          x: c * TILE + TILE / 2 - 28, y: r * TILE, baseY: r * TILE, w: 56, h: 50,
          vx: 70 * DIFFS[game.diff].mult, vy: 0, dir: 1, dt: 0, anim: 0,
          state: 'walk', capT: 0, hp: 5, maxHp: 5, shootT: 1.6, color: '#ff2f6b', hit: 0,
        };
      }
    }
  }
  // boss-stage intro warning
  game.bossWarn = game.king ? 3.2 : 0;
  if (game.king) sfx.alarm();
}

function startGame() {
  game.score = 0;
  game.lives = 3;
  game.stage = 0;
  game.state = 'PLAYING';
  game.overlayT = 0;
  loadStage(0);
  sfx.start();
}

function loseLife() {
  game.lives--;
  game.shake = 0.4;
  sfx.die();
  if (game.lives < 0) {
    if (game.score > game.high) { game.high = game.score; localStorage.setItem('bb_high', game.high); }
    game.state = 'GAMEOVER';
    game.overlayT = 0;
  } else {
    const p = game.player;
    p.x = p.startX; p.y = p.startY; p.vx = 0; p.vy = 0; p.inv = RESPAWN_INV; p.dir = 1;
    game.shots = [];   // clear boss shots on respawn
  }
}

// touching the king kills instantly, regardless of remaining lives
function instantDeath() {
  game.lives = 0;
  game.shake = 0.5;
  sfx.die();
  if (game.score > game.high) { game.high = game.score; localStorage.setItem('bb_high', game.high); }
  game.state = 'GAMEOVER';
  game.overlayT = 0;
}

function nextStage() {
  if (game.stage >= STAGES.length - 1) {
    game.newRecord = game.score > game.high;
    if (game.newRecord) { game.high = game.score; localStorage.setItem('bb_high', game.high); }
    game.state = 'WIN';
    game.overlayT = 0;
    game.winSpark = 0;
    game.particles = [];
    sfx.win();
  } else {
    game.stage++;
    loadStage(game.stage);
    game.state = 'PLAYING';
    game.overlayT = 0;
  }
}

/* =========================================================================
   SPAWNERS
   ========================================================================= */
const FRUITS = ['cherry', 'banana', 'grape', 'melon'];
function spawnFruit(x, y, kind) {
  game.fruits.push({
    x, y, w: 20, h: 20, vx: (Math.random() - 0.5) * 60, vy: -150,
    grounded: false, dt: 0, life: 7, kind: kind || FRUITS[(Math.random() * FRUITS.length) | 0],
    score: 500,
  });
}
function burst(x, y, color, n = 10) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 60 + Math.random() * 160;
    game.particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40, life: 0.5 + Math.random() * 0.3, color, r: 2 + Math.random() * 2 });
  }
}
function addScore(n, x, y) {
  game.score += n;
  game.particles.push({ x, y, text: '+' + n, vy: -50, life: 0.9, color: COL.yellow, r: 0 });
}

/* --- WIN celebration FX: drifting confetti + bursting fireworks --- */
const PARTY = ['#ff5fb0', '#38e6ff', '#ffe24d', '#5fe6a0', '#b06bff', '#ff8a3a', '#ffffff'];
function updateWinFx(dt) {
  game.winSpark -= dt;
  // steady stream of confetti falling from the top
  for (let i = 0; i < 3; i++) {
    game.particles.push({
      x: Math.random() * W, y: -8,
      vx: (Math.random() - 0.5) * 80, vy: 40 + Math.random() * 90,
      life: 2.2 + Math.random() * 1.6, color: PARTY[(Math.random() * PARTY.length) | 0],
      r: 2 + Math.random() * 2.5,
    });
  }
  // periodic firework bursts
  if (game.winSpark <= 0) {
    game.winSpark = 0.45 + Math.random() * 0.35;
    const fx = 60 + Math.random() * (W - 120);
    const fy = 70 + Math.random() * 180;
    burst(fx, fy, PARTY[(Math.random() * PARTY.length) | 0], 22);
    sfx.firework();
  }
}

/* =========================================================================
   UPDATE
   ========================================================================= */
function update(dt) {
  game.t += dt;
  if (game.shake > 0) game.shake = Math.max(0, game.shake - dt);
  if (pressed.mute) muteAll = !muteAll;

  if (game.state === 'TITLE') {
    if (pressed.left)  game.diff = (game.diff + DIFFS.length - 1) % DIFFS.length;
    if (pressed.right) game.diff = (game.diff + 1) % DIFFS.length;
    if (pressed.enter) startGame();
  } else if (game.state === 'PLAYING') {
    updatePlaying(dt);
  } else if (game.state === 'STAGECLEAR') {
    game.overlayT += dt;
    if (game.overlayT > 1.8 || pressed.enter) nextStage();
  } else if (game.state === 'WIN') {
    game.overlayT += dt;
    updateWinFx(dt);
    if (game.overlayT > 0.6 && pressed.enter) { game.state = 'TITLE'; }
  } else if (game.state === 'GAMEOVER') {
    game.overlayT += dt;
    if (game.overlayT > 0.6 && pressed.enter) { game.state = 'TITLE'; }
  }

  // update particles in every state
  for (const p of game.particles) {
    p.x += (p.vx || 0) * dt; p.y += p.vy * dt;
    if (p.r) p.vy += 700 * dt;
    p.life -= dt;
  }
  game.particles = game.particles.filter((p) => p.life > 0);

  // background music follows the current state/stage
  updateMusic();

  // clear edge-triggers
  for (const k in pressed) pressed[k] = false;
}

function updatePlaying(dt) {
  const p = game.player;
  p.dt = dt;
  p.anim += dt;
  if (p.inv > 0) p.inv -= dt;
  if (game.bossWarn > 0) game.bossWarn -= dt;

  // --- player input ---
  let ax = 0;
  if (keys.left)  { ax -= 1; p.dir = -1; }
  if (keys.right) { ax += 1; p.dir = 1; }
  p.vx = ax * MOVE_SPEED;
  if (pressed.jump && p.grounded) { p.vy = -JUMP_VEL; p.grounded = false; sfx.jump(); }

  moveX(p);
  moveY(p, true);

  // --- shooting ---
  game.shootCd -= dt;
  if (pressed.shoot && game.shootCd <= 0 && game.bubbles.filter(b => b.kind === 'empty').length < MAX_BUBBLES) {
    game.shootCd = SHOOT_CD;
    game.bubbles.push({
      x: p.x + p.w / 2 + p.dir * 10 - 9, y: p.y + 2, w: 18, h: 18,
      vx: p.dir * BUBBLE_SPEED, vy: 0, flyT: BUBBLE_FLY, life: BUBBLE_LIFE,
      kind: 'empty', anim: 0,
    });
    sfx.shoot();
  }

  // --- bubbles ---
  for (const b of game.bubbles) {
    b.anim += dt;
    b.life -= dt;
    if (b.flyT > 0) {
      b.flyT -= dt;
      b.x += b.vx * dt;
      // bounce off side walls during fly
      const cx = b.vx > 0 ? Math.floor((b.x + b.w) / TILE) : Math.floor(b.x / TILE);
      const rr = Math.floor((b.y + b.h / 2) / TILE);
      if (isWall(cx, rr)) { b.vx *= -0.4; b.flyT = 0; }
      if (b.flyT <= 0) b.vx = 0;
    } else {
      b.y -= BUBBLE_RISE * dt;
      b.x += Math.sin(b.anim * 3) * 12 * dt;
      const topR = Math.floor(b.y / TILE);
      if (isWall(Math.floor((b.x + b.w / 2) / TILE), topR)) b.y = (topR + 1) * TILE;
    }
  }

  // --- enemies ---
  for (const e of game.enemies) {
    e.dt = dt;
    e.anim += dt;
    if (e.state === 'walk') {
      // patrol
      e.vx = e.dir * e.speed * (e.mad ? 1.4 : 1);
      // mild pursuit: occasionally face the player
      if (Math.random() < 0.012) e.dir = (p.x > e.x ? 1 : -1);
      moveX(e);
      if (e.hitWall) e.dir *= -1;
      if (e.dropping > 0) {
        // diving off a bar: fall through one-way platforms until landing
        e.dropping -= dt;
        moveY(e, false);
        if (e.grounded) e.dropping = 0;
      } else {
        moveY(e, true);
        if (e.grounded) {
          const footX = e.dir > 0 ? e.x + e.w + 2 : e.x - 2;
          const fc = Math.floor(footX / TILE);
          const fr = Math.floor((e.y + e.h + 3) / TILE);
          const onPlat = isPlat(Math.floor((e.x + e.w / 2) / TILE), Math.floor((e.y + e.h + 1) / TILE));
          if (e.canDrop && onPlat && Math.random() < 0.009) {
            e.dropping = 0.45; e.y += 2;   // jump off the bar and descend
          } else if (!isGroundTile(fc, fr)) {
            e.dir *= -1;
          }
        }
      }
    } else if (e.state === 'bubbled') {
      e.capT -= dt;
      e.y -= BUBBLE_RISE * 0.9 * dt;
      e.x += Math.sin(e.anim * 2.5) * 14 * dt;
      // keep inside walls
      if (e.x < TILE) e.x = TILE;
      if (e.x + e.w > W - TILE) e.x = W - TILE - e.w;
      const topR = Math.floor(e.y / TILE);
      if (isWall(Math.floor((e.x + e.w / 2) / TILE), topR)) e.y = (topR + 1) * TILE;
      if (e.capT <= 0) { e.state = 'walk'; e.mad = true; e.vy = 0; } // escape, angrier
    }
  }

  // --- king (stage-3 boss): hover, bob, shoot at the player ---
  if (game.king) {
    const k = game.king; k.dt = dt; k.anim += dt;
    if (k.hit > 0) k.hit = Math.max(0, k.hit - dt);
    if (k.state === 'walk') {
      k.x += k.vx * dt;
      if (k.x < TILE) { k.x = TILE; k.vx = Math.abs(k.vx); }
      if (k.x + k.w > W - TILE) { k.x = W - TILE - k.w; k.vx = -Math.abs(k.vx); }
      k.dir = k.vx > 0 ? 1 : -1;
      k.y = k.baseY + Math.sin(k.anim * 1.5) * 16;
      k.shootT -= dt;
      if (k.shootT <= 0) {
        k.shootT = 1.5 / DIFFS[game.diff].mult;
        const sx = k.x + k.w / 2, sy = k.y + k.h / 2;
        const ang = Math.atan2((p.y + p.h / 2) - sy, (p.x + p.w / 2) - sx);
        const sp = 210 * DIFFS[game.diff].mult;
        game.shots.push({ x: sx - 7, y: sy - 7, w: 14, h: 14, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, life: 4, anim: 0 });
        sfx.shoot();
      }
    } else if (k.state === 'bubbled') {
      k.capT -= dt;
      k.y -= BUBBLE_RISE * 0.6 * dt;
      k.x += Math.sin(k.anim * 2) * 12 * dt;
      if (k.x < TILE) k.x = TILE;
      if (k.x + k.w > W - TILE) k.x = W - TILE - k.w;
      if (k.y < TILE) k.y = TILE;
      if (k.capT <= 0) { k.state = 'walk'; k.baseY = Math.max(TILE, k.y); k.shootT = 0.8; }
    }
  }

  // --- king projectiles ---
  for (const s of game.shots) {
    s.anim += dt;
    s.x += s.vx * dt; s.y += s.vy * dt; s.life -= dt;
    if (isWall(Math.floor((s.x + s.w / 2) / TILE), Math.floor((s.y + s.h / 2) / TILE))) s.life = -1;
    if (p.inv <= 0 && aabb(p, s)) { s.life = -1; loseLife(); }   // shot hit: -1 life
  }
  game.shots = game.shots.filter((s) => s.life > 0);

  // --- bubble vs enemy capture ---
  for (const b of game.bubbles) {
    if (b.kind !== 'empty') continue;
    for (const e of game.enemies) {
      if (e.state === 'walk' && aabb(b, e)) {
        e.state = 'bubbled'; e.capT = CAPTURE_TIME / DIFFS[game.diff].mult;
        e.vx = 0; e.vy = 0;
        b.life = -1; // consume bubble
        sfx.capture();
        burst(e.x + e.w / 2, e.y + e.h / 2, COL.cyan, 6);
        break;
      }
    }
  }
  // --- bubble vs king: 1~4번째는 직접 피가 깎이고, 마지막(5번째) 한 방은 거품에 가둠 ---
  if (game.king && game.king.state === 'walk') {
    const k = game.king;
    for (const b of game.bubbles) {
      if (b.kind === 'empty' && aabb(b, k)) {
        b.life = -1; game.shake = 0.3;
        if (k.hp > 1) {
          // 아직 피가 남음 → 갇히지 않고 피만 1 깎임
          k.hp--; sfx.kingHit();
          k.hit = 0.22;                 // 피격 플래시 타이머
          game.shake = 0.4;
          addScore(400, k.x + k.w / 2, k.y);
          // 강조: 흰 섬광 링 + 색 파편을 크게 터뜨림
          burst(k.x + k.w / 2, k.y + k.h / 2, '#ffffff', 14);
          burst(k.x + k.w / 2, k.y + k.h / 2, k.color, 16);
        } else {
          // 마지막 한 방: 피가 다 깎이며 거품에 갇힘 (터뜨려야 처치)
          k.hp = 0;
          k.state = 'bubbled'; k.capT = 5; sfx.capture();
          burst(k.x + k.w / 2, k.y + k.h / 2, COL.cyan, 16);
        }
        break;
      }
    }
  }
  game.bubbles = game.bubbles.filter((b) => b.life > 0);

  // --- player vs bubbled enemy (pop) ---
  for (const e of game.enemies) {
    if (e.state === 'bubbled' && aabb(p, e)) {
      e.state = 'dead';
      addScore(100, e.x + e.w / 2, e.y);
      spawnFruit(e.x, e.y, null);
      burst(e.x + e.w / 2, e.y + e.h / 2, e.color, 14);
      sfx.pop();
    }
  }
  game.enemies = game.enemies.filter((e) => e.state !== 'dead');

  // --- player vs walking enemy (hurt) ---
  if (p.inv <= 0) {
    for (const e of game.enemies) {
      if (e.state === 'walk' && aabb(p, e)) { loseLife(); break; }
    }
  }

  // --- player vs king ---
  if (game.king) {
    const k = game.king;
    if (k.state === 'walk' && p.inv <= 0 && aabb(p, k)) {
      instantDeath();                 // touching the king: instant death, ignores lives
      return;
    } else if (k.state === 'bubbled' && aabb(p, k)) {
      // 마지막 거품을 터뜨리면 왕 처치 → 졸병이 남아있어도 즉시 스테이지 클리어
      addScore(3000, k.x + k.w / 2, k.y);
      burst(k.x + k.w / 2, k.y + k.h / 2, COL.yellow, 26);
      game.king = null;               // boss defeated
      game.shake = 0.5; sfx.pop();
      game.state = 'STAGECLEAR';
      game.overlayT = 0;
      sfx.clear();
      return;
    }
  }

  // --- fruits ---
  for (const f of game.fruits) {
    f.dt = dt; f.life -= dt;
    moveX(f); moveY(f, true);
    if (aabb(p, f)) { f.life = -1; addScore(f.score, f.x + f.w / 2, f.y); sfx.fruit(); }
  }
  game.fruits = game.fruits.filter((f) => f.life > 0);

  // --- win check (stage 3 also requires the king defeated) ---
  if (game.enemies.length === 0 && !game.king && game.state === 'PLAYING') {
    game.state = 'STAGECLEAR';
    game.overlayT = 0;
    sfx.clear();
  }
}

/* =========================================================================
   RENDER
   ========================================================================= */
function drawLevel() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = game.grid[r][c];
      if (t === '#') {
        ctx.fillStyle = wallPat;
        ctx.save(); ctx.translate(c * TILE, r * TILE);
        ctx.fillRect(0, 0, TILE, TILE);
        ctx.restore();
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(c * TILE, r * TILE, TILE, 2);
      } else if (t === '=') {
        const px = c * TILE, py = r * TILE, hgt = 18;
        ctx.fillStyle = platPat;
        ctx.save(); ctx.translate(px, py); ctx.fillRect(0, 0, TILE, hgt); ctx.restore();
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fillRect(px, py, TILE, 3);
        ctx.fillStyle = 'rgba(0,0,0,0.30)';
        ctx.fillRect(px, py + hgt - 3, TILE, 3);
      }
    }
  }
}

/* the player creature — a cute round baby dinosaur */
function drawCreature(e, color, dir) {
  const cx = e.x + e.w / 2, by = e.y + e.h;
  const moving = Math.abs(e.vx) > 1;
  const bob = Math.sin(e.anim * 8) * (moving ? 1.4 : 0.7);
  ctx.save();
  ctx.translate(cx, by + bob);
  ctx.scale(dir, 1);            // face travel direction
  const dark = '#2f9e63', mid = color, light = '#86f0ad';
  const Hh = e.h, Ww = e.w;

  // tail (curls out behind)
  ctx.fillStyle = mid;
  ctx.beginPath();
  ctx.moveTo(-Ww * 0.30, -3);
  ctx.quadraticCurveTo(-Ww * 0.95, -2, -Ww * 0.86, -Hh * 0.5);
  ctx.quadraticCurveTo(-Ww * 0.66, -Hh * 0.26, -Ww * 0.30, -Hh * 0.3);
  ctx.fill();

  // back plates (cute rounded fins)
  ctx.fillStyle = '#ffce3a';
  for (const [px, py] of [[-Ww * 0.16, -Hh * 0.98], [-Ww * 0.46, -Hh * 0.82], [-Ww * 0.70, -Hh * 0.52]]) {
    ctx.beginPath();
    ctx.moveTo(px - 4, py + 4); ctx.quadraticCurveTo(px, py - 6, px + 4, py + 4);
    ctx.closePath(); ctx.fill();
  }

  // body (big egg)
  const grad = ctx.createLinearGradient(0, -Hh * 1.1, 0, 0);
  grad.addColorStop(0, light); grad.addColorStop(0.5, mid); grad.addColorStop(1, dark);
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(0, -Hh * 0.5, Ww * 0.62, Hh * 0.62, 0, 0, 7); ctx.fill();

  // belly patch
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.ellipse(2, -Hh * 0.38, Ww * 0.32, Hh * 0.4, 0, 0, 7); ctx.fill();

  // snout bump
  ctx.fillStyle = mid;
  ctx.beginPath(); ctx.ellipse(Ww * 0.42, -Hh * 0.58, Ww * 0.3, Hh * 0.26, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#1d6e42';
  ctx.beginPath(); ctx.arc(Ww * 0.62, -Hh * 0.62, 1.5, 0, 7); ctx.fill();

  // little arm
  ctx.fillStyle = mid;
  ctx.beginPath(); ctx.ellipse(Ww * 0.44, -Hh * 0.34, 3.5, 5, -0.3, 0, 7); ctx.fill();

  // legs + toes
  const sw = moving ? Math.sin(e.anim * 8) * 2 : 0;
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.ellipse(-5 + sw, -3, 5, 5, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6 - sw, -3, 5, 5, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#1d6e42';
  for (const tx of [-8, -3, 4, 9]) { ctx.beginPath(); ctx.arc(tx, 0, 1.3, 0, 7); ctx.fill(); }

  // big cute eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(Ww * 0.2, -Hh * 0.8, 6.5, 7.5, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#15351f';
  ctx.beginPath(); ctx.arc(Ww * 0.27, -Hh * 0.78, 3.4, 0, 7); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(Ww * 0.31, -Hh * 0.82, 1.4, 0, 7); ctx.fill();

  // cheek blush
  ctx.fillStyle = 'rgba(255,120,150,0.5)';
  ctx.beginPath(); ctx.ellipse(Ww * 0.1, -Hh * 0.58, 3, 2, 0, 0, 7); ctx.fill();

  ctx.restore();
}

/* enemies — round angry blobs */
function drawEnemy(e) {
  const cx = e.x + e.w / 2, cy = e.y + e.h / 2;
  const bob = Math.sin(e.anim * 7) * 1.2;
  ctx.save();
  ctx.translate(cx, cy + bob);
  // body
  const grad = ctx.createRadialGradient(-3, -4, 2, 0, 0, e.w / 2 + 3);
  grad.addColorStop(0, '#fff6'); grad.addColorStop(0.25, e.color); grad.addColorStop(1, '#00000055');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, e.w / 2 + 1, 0, 7); ctx.fill();
  // little feet
  ctx.fillStyle = '#00000066';
  ctx.beginPath(); ctx.ellipse(-6, e.h / 2 - 1, 4, 3, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, e.h / 2 - 1, 4, 3, 0, 0, 7); ctx.fill();
  // eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-5, -2, 4.5, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -2, 4.5, 0, 7); ctx.fill();
  ctx.fillStyle = '#1a1030';
  ctx.beginPath(); ctx.arc(-5 + e.dir * 1.5, -1, 2.2, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(5 + e.dir * 1.5, -1, 2.2, 0, 7); ctx.fill();
  // angry brows
  ctx.strokeStyle = '#1a1030'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-9, -8); ctx.lineTo(-2, -5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9, -8); ctx.lineTo(2, -5); ctx.stroke();
  ctx.restore();
}

/* the KING boss — big crowned, fanged blob */
function drawKing(k) {
  const cx = k.x + k.w / 2, cy = k.y + k.h / 2;
  const bob = Math.sin(k.anim * 3) * 2;
  const flash = k.hit > 0 ? k.hit / 0.22 : 0;   // 1 → 0 으로 감쇠
  ctx.save();
  ctx.translate(cx, cy + bob);
  // 피격 시 살짝 부풀고 붉은 글로우로 강조
  if (flash > 0) {
    const s = 1 + flash * 0.16;
    ctx.scale(s, s);
    ctx.shadowColor = '#ff3b5c'; ctx.shadowBlur = 18 * flash;
  }
  // feet
  ctx.fillStyle = '#5a0a22';
  ctx.beginPath(); ctx.ellipse(-11, k.h / 2 - 4, 7, 4, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(11, k.h / 2 - 4, 7, 4, 0, 0, 7); ctx.fill();
  // body
  const grad = ctx.createRadialGradient(-7, -9, 4, 0, 0, k.w / 2 + 6);
  grad.addColorStop(0, '#ff9bb5'); grad.addColorStop(0.4, k.color); grad.addColorStop(1, '#7a0d2e');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(0, 0, k.w / 2, k.h / 2, 0, 0, 7); ctx.fill();
  ctx.shadowBlur = 0;                    // 글로우는 몸통까지만 적용
  // 피격 흰 섬광 오버레이
  if (flash > 0) {
    ctx.globalAlpha = flash * 0.8;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.ellipse(0, 0, k.w / 2, k.h / 2, 0, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-9, -4, 8, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(9, -4, 8, 0, 7); ctx.fill();
  ctx.fillStyle = '#2a0010';
  ctx.beginPath(); ctx.arc(-9 + k.dir * 2, -3, 3.6, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(9 + k.dir * 2, -3, 3.6, 0, 7); ctx.fill();
  // angry brows
  ctx.strokeStyle = '#2a0010'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-17, -14); ctx.lineTo(-3, -8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(17, -14); ctx.lineTo(3, -8); ctx.stroke();
  // fanged grin
  ctx.fillStyle = '#2a0010';
  ctx.beginPath(); ctx.ellipse(0, 9, 9, 5, 0, 0, Math.PI); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.moveTo(-6, 6); ctx.lineTo(-4, 12); ctx.lineTo(-2, 6); ctx.fill();
  ctx.beginPath(); ctx.moveTo(6, 6); ctx.lineTo(4, 12); ctx.lineTo(2, 6); ctx.fill();
  // crown
  const cw = k.w * 0.52, top = -k.h / 2 - 1;
  ctx.fillStyle = '#ffd23a';
  ctx.beginPath();
  ctx.moveTo(-cw / 2, top);
  ctx.lineTo(-cw / 2, top - 11); ctx.lineTo(-cw / 4, top - 3);
  ctx.lineTo(0, top - 14); ctx.lineTo(cw / 4, top - 3);
  ctx.lineTo(cw / 2, top - 11); ctx.lineTo(cw / 2, top);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff3b5c';
  ctx.beginPath(); ctx.arc(0, top - 4, 2.4, 0, 7); ctx.fill();
  ctx.restore();
  if (k.state === 'bubbled') drawBubbleShell(k.x - 6, k.y - 6, k.w + 12, k.h + 12, k.anim);
}

/* king's fireball projectile */
function drawShot(s) {
  const cx = s.x + s.w / 2, cy = s.y + s.h / 2, r = s.w / 2;
  ctx.save();
  ctx.translate(cx, cy);
  const g = ctx.createRadialGradient(0, 0, 1, 0, 0, r + 2);
  g.addColorStop(0, '#fff'); g.addColorStop(0.4, '#ffd23a'); g.addColorStop(1, '#ff4a2a');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill();
  ctx.strokeStyle = 'rgba(255,120,40,0.6)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, r + 2 + Math.sin(s.anim * 20), 0, 7); ctx.stroke();
  ctx.restore();
}

function drawBubbleShell(x, y, w, h, t) {
  const cx = x + w / 2, cy = y + h / 2, r = w / 2;
  ctx.save();
  ctx.strokeStyle = 'rgba(150,235,255,0.9)';
  ctx.lineWidth = 2;
  ctx.fillStyle = 'rgba(120,225,255,0.18)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath(); ctx.arc(cx - r * 0.35, cy - r * 0.35, r * 0.22, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.arc(cx + r * 0.25, cy + r * 0.3, r * 0.12, 0, 7); ctx.fill();
  ctx.restore();
}

function drawFruit(f) {
  const cx = f.x + f.w / 2, cy = f.y + f.h / 2;
  // blink near end of life
  if (f.life < 2 && Math.floor(f.life * 8) % 2 === 0) return;
  ctx.save(); ctx.translate(cx, cy);
  if (f.kind === 'cherry') {
    ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-4, 7); ctx.quadraticCurveTo(0, -8, 1, -7); ctx.moveTo(5, 7); ctx.quadraticCurveTo(2, -8, 1, -7); ctx.stroke();
    ctx.fillStyle = '#ff3b5c';
    ctx.beginPath(); ctx.arc(-4, 5, 4.5, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(5, 5, 4.5, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff8'; ctx.beginPath(); ctx.arc(-5, 3, 1.4, 0, 7); ctx.fill();
  } else if (f.kind === 'banana') {
    ctx.strokeStyle = '#ffd23a'; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(0, -3, 8, 0.5, 2.6); ctx.stroke();
    ctx.strokeStyle = '#7a5a10'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, -3, 8, 0.4, 0.6); ctx.stroke();
  } else if (f.kind === 'grape') {
    ctx.fillStyle = '#9b5cff';
    const pts = [[-4, -2], [4, -2], [0, 0], [-3, 4], [3, 4], [0, 7]];
    for (const [dx, dy] of pts) { ctx.beginPath(); ctx.arc(dx, dy, 3.2, 0, 7); ctx.fill(); }
    ctx.fillStyle = '#4caf50'; ctx.fillRect(-1, -8, 2, 4);
  } else { // melon
    ctx.fillStyle = '#36c46a'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.fill();
    ctx.strokeStyle = '#1c7a3e'; ctx.lineWidth = 1.5;
    for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i * 4, -7); ctx.quadraticCurveTo(i * 6, 0, i * 4, 7); ctx.stroke(); }
  }
  ctx.restore();
}

/* text helper */
function text(str, x, y, size, color, align = 'left', shadow = true) {
  ctx.font = size + "px 'Press Start 2P', monospace";
  ctx.textAlign = align; ctx.textBaseline = 'alphabetic';
  if (shadow) { ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillText(str, x + 2, y + 2); }
  ctx.fillStyle = color; ctx.fillText(str, x, y);
}

function drawHUD() {
  ctx.fillStyle = COL.hud;
  ctx.fillRect(0, 0, W, 34);
  text('1UP', 10, 14, 8, COL.cyan);
  text(String(game.score).padStart(7, '0'), 10, 28, 10, COL.ink);
  text('HIGH', W / 2, 14, 8, COL.pink, 'center');
  text(String(game.high).padStart(7, '0'), W / 2, 28, 10, COL.yellow, 'center');
  // lives icons
  for (let i = 0; i < Math.max(0, game.lives); i++) {
    const lx = W - 16 - i * 20;
    ctx.save(); ctx.translate(lx, 18); ctx.scale(0.6, 0.6);
    ctx.fillStyle = COL.green; ctx.beginPath(); ctx.arc(0, 0, 11, Math.PI, 0); ctx.lineTo(11, 6); ctx.lineTo(-11, 6); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-4, -2, 3, 0, 7); ctx.arc(4, -2, 3, 0, 7); ctx.fill();
    ctx.fillStyle = '#16203a'; ctx.beginPath(); ctx.arc(-4, -2, 1.4, 0, 7); ctx.arc(4, -2, 1.4, 0, 7); ctx.fill();
    ctx.restore();
  }
  text('STAGE ' + (game.stage + 1), W - 14, 30, 8, COL.ink, 'right');
  if (muteAll) text('MUTE', 8, H - 8, 7, COL.pink, 'left');
}

function render() {
  // shake
  ctx.save();
  if (game.shake > 0) {
    const s = game.shake * 6;
    ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
  }

  // background
  ctx.fillStyle = COL.bg; ctx.fillRect(-10, -10, W + 20, H + 20);

  if (game.state === 'TITLE') { drawTitle(); ctx.restore(); return; }

  // playfield
  drawLevel();
  for (const f of game.fruits) drawFruit(f);
  for (const b of game.bubbles) if (b.kind === 'empty') drawBubbleShell(b.x, b.y, b.w, b.h, b.anim);
  for (const e of game.enemies) {
    if (e.state === 'bubbled') {
      ctx.globalAlpha = 0.85; drawEnemy(e); ctx.globalAlpha = 1;
      drawBubbleShell(e.x - 4, e.y - 4, e.w + 8, e.h + 8, e.anim);
    } else {
      drawEnemy(e);
    }
  }
  // king + its shots
  if (game.king) drawKing(game.king);
  for (const s of game.shots) drawShot(s);

  // player (blink while invincible)
  const p = game.player;
  if (p && !(p.inv > 0 && Math.floor(game.t * 12) % 2 === 0)) drawCreature(p, COL.green, p.dir);

  // particles
  for (const pt of game.particles) {
    if (pt.text) { text(pt.text, pt.x, pt.y, 8, pt.color, 'center'); }
    else { ctx.fillStyle = pt.color; ctx.globalAlpha = Math.max(0, pt.life * 2); ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, 7); ctx.fill(); ctx.globalAlpha = 1; }
  }

  drawHUD();

  // boss health bar — 왕 바로 아래에 따라다니며 표시 (stage 3)
  if (game.king && game.state === 'PLAYING') {
    const k = game.king;
    const bw = 64, bh = 6;
    let bx = k.x + k.w / 2 - bw / 2;
    let by = k.y + k.h + 6;            // 왕 머리/몸 바로 아래
    bx = Math.max(4, Math.min(W - bw - 4, bx));   // 화면 밖으로 안 나가게
    ctx.fillStyle = '#3a0a18'; ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = COL.pink; ctx.fillRect(bx, by, bw * Math.max(0, k.hp / k.maxHp), bh);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, bw, bh);
  }

  if (game.state === 'PLAYING' && game.bossWarn > 0) drawBossWarning();

  if (game.state === 'STAGECLEAR') overlayBox('STAGE CLEAR!', STAGES[game.stage].name, COL.cyan);
  if (game.state === 'GAMEOVER') overlayBox('GAME OVER', 'PRESS ENTER', COL.pink);
  if (game.state === 'WIN') drawWin();

  ctx.restore();
}

function overlayBox(title, sub, color) {
  ctx.fillStyle = 'rgba(5,6,15,0.78)';
  ctx.fillRect(0, 34, W, H - 34);
  const blink = game.state === 'STAGECLEAR' || Math.floor(game.t * 2) % 2 === 0 || game.state === 'WIN';
  text(title, W / 2, H / 2 - 6, 26, color, 'center');
  if (blink) text(sub, W / 2, H / 2 + 30, 10, COL.ink, 'center');
}

/* flashing alert shown for a few seconds when the KING boss appears */
function drawBossWarning() {
  const flashOn = Math.floor(game.t * 6) % 2 === 0;
  const cy = H * 0.40;
  ctx.save();
  // hazard band
  ctx.fillStyle = 'rgba(40,0,12,0.55)';
  ctx.fillRect(0, cy - 30, W, 70);
  ctx.fillStyle = flashOn ? '#ff2f6b' : '#ffd23a';
  ctx.fillRect(0, cy - 30, W, 3);
  ctx.fillRect(0, cy + 37, W, 3);
  text('!  W A R N I N G  !', W / 2, cy - 6, 10, flashOn ? COL.yellow : '#ff7aa6', 'center');
  const pulse = 14 + Math.sin(game.t * 10) * 1.2;
  text("DON'T TOUCH THE KING!", W / 2, cy + 24, pulse, flashOn ? '#ff5fb0' : '#ffffff', 'center');
  ctx.restore();
}

/* a golden victory trophy */
function drawTrophy(cx, cy, s, shine) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);
  const gold = ctx.createLinearGradient(0, -22, 0, 18);
  gold.addColorStop(0, '#fff3b0'); gold.addColorStop(0.45, '#ffd23a'); gold.addColorStop(1, '#c8881a');
  // side handles
  ctx.strokeStyle = '#ffd23a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(-13, -10, 7, Math.PI * 0.5, Math.PI * 1.5, true); ctx.stroke();
  ctx.beginPath(); ctx.arc(13, -10, 7, Math.PI * 0.5, Math.PI * 1.5); ctx.stroke();
  // cup
  ctx.fillStyle = gold;
  ctx.beginPath();
  ctx.moveTo(-13, -20); ctx.lineTo(13, -20);
  ctx.lineTo(10, -4); ctx.quadraticCurveTo(0, 8, -10, -4);
  ctx.closePath(); ctx.fill();
  // stem + base
  ctx.fillStyle = '#e0a92a';
  ctx.fillRect(-2.5, 4, 5, 7);
  ctx.fillRect(-9, 11, 18, 4);
  ctx.fillRect(-12, 15, 24, 4);
  // shine sweep
  ctx.fillStyle = 'rgba(255,255,255,' + (0.25 + 0.25 * Math.sin(shine * 4)) + ')';
  ctx.beginPath(); ctx.moveTo(-7, -18); ctx.lineTo(-3, -18); ctx.lineTo(-6, -6); ctx.lineTo(-10, -6); ctx.closePath(); ctx.fill();
  // star on the cup
  ctx.fillStyle = '#ff6a00';
  ctx.save(); ctx.translate(0, -11); ctx.rotate(shine * 0.6);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = -Math.PI / 2 + i * (Math.PI * 2 / 5);
    const a2 = a + Math.PI / 5;
    ctx.lineTo(Math.cos(a) * 5, Math.sin(a) * 5);
    ctx.lineTo(Math.cos(a2) * 2.2, Math.sin(a2) * 2.2);
  }
  ctx.closePath(); ctx.fill(); ctx.restore();
  ctx.restore();
}

/* the big ALL CLEAR celebration screen */
function drawWin() {
  const t = game.t, ot = game.overlayT;
  // soft dim so confetti/fireworks behind still read
  ctx.fillStyle = 'rgba(5,6,15,0.55)';
  ctx.fillRect(0, 0, W, H);

  // rainbow ALL CLEAR banner (each letter cycles hue)
  const title = 'ALL CLEAR!';
  ctx.font = "34px 'Press Start 2P', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  const lw = ctx.measureText(title).width;
  let lx = W / 2 - lw / 2;
  for (let i = 0; i < title.length; i++) {
    const ch = title[i];
    const cw = ctx.measureText(ch).width;
    const hue = (t * 120 + i * 32) % 360;
    const yo = Math.sin(t * 4 + i * 0.6) * 5;     // wavy bounce
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText(ch, lx + cw / 2 + 2, 130 + yo + 2);
    ctx.fillStyle = 'hsl(' + hue + ',90%,65%)';
    ctx.fillText(ch, lx + cw / 2, 130 + yo);
    lx += cw;
  }

  text('STAGE 3 COMPLETE', W / 2, 168, 11, COL.cyan, 'center');

  // trophy with celebrating dino on each side
  const pop = Math.min(1, ot * 2);              // little entrance pop
  drawTrophy(W / 2, 230, 2.4 * pop, t);

  const jump = Math.abs(Math.sin(t * 6)) * 8;
  const dinoL = { x: W / 2 - 110, y: 250 - jump, w: 34, h: 38, vx: 1, anim: t };
  const dinoR = { x: W / 2 + 76, y: 250 - jump, w: 34, h: 38, vx: 1, anim: t + 1 };
  drawCreature(dinoL, COL.green, 1);
  drawCreature(dinoR, COL.green, -1);

  // final score panel
  text('FINAL SCORE', W / 2, 318, 10, COL.pink, 'center');
  text(String(game.score).padStart(7, '0'), W / 2, 348, 20, COL.yellow, 'center');

  // NEW RECORD! flashes if the high score was beaten
  if (game.newRecord && Math.floor(t * 4) % 2 === 0) {
    text('★ NEW RECORD! ★', W / 2, 384, 12, COL.cyan, 'center');
  } else if (!game.newRecord) {
    text('HIGH ' + String(game.high).padStart(7, '0'), W / 2, 382, 9, '#9aa3d0', 'center');
  }

  // thank-you + prompt
  text('THANK YOU FOR PLAYING!', W / 2, 424, 9, COL.green, 'center');
  if (Math.floor(t * 1.6) % 2 === 0) text('PRESS ENTER', W / 2, 456, 11, COL.ink, 'center');
}

function drawTitle() {
  const t = game.t;
  // title
  text('BUBBLE', W / 2, 120, 40, COL.cyan, 'center');
  text('BURST', W / 2, 175, 40, COL.pink, 'center');
  // floating demo bubbles
  for (let i = 0; i < 5; i++) {
    const bx = 90 + i * 115 + Math.sin(t * 1.5 + i) * 14;
    const by = 230 + Math.sin(t * 2 + i * 1.3) * 16;
    drawBubbleShell(bx, by, 30, 30, t + i);
  }
  // mascot
  if (game.player) {}
  const demo = { x: W / 2 - 18, y: 250, w: 36, h: 40, vx: 0, anim: t };
  drawCreature(demo, COL.green, Math.sin(t) > 0 ? 1 : -1);

  // difficulty selector
  text('DIFFICULTY', W / 2, 350, 10, COL.yellow, 'center');
  const d = DIFFS[game.diff];
  text('< ' + d.key + ' >', W / 2, 378, 16, COL.ink, 'center');

  if (Math.floor(t * 1.6) % 2 === 0) text('PRESS ENTER TO START', W / 2, 425, 11, COL.cyan, 'center');
  text('MOVE: ARROWS / WASD', W / 2, 452, 7, '#9aa3d0', 'center');
  text('JUMP: UP  SHOOT: SPACE  M: ' + (muteAll ? 'SOUND OFF' : 'MUTE'), W / 2, 468, 7, '#9aa3d0', 'center');

  text(String(game.high).padStart(7, '0'), W / 2, 50, 9, COL.yellow, 'center');
  text('HIGH SCORE', W / 2, 36, 7, COL.pink, 'center');
}

/* =========================================================================
   MAIN LOOP
   ========================================================================= */
const portraitMQ = window.matchMedia('(orientation: portrait)');
const blockedPortrait = () => document.body.classList.contains('touch') && portraitMQ.matches;
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.05) dt = 0.05;  // clamp (tab switches etc.)
  if (!blockedPortrait()) update(dt);   // freeze while the rotate overlay is up
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
